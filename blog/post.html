<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブログ - neplov</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  /* Prose headings for markdown-rendered content */
  .prose h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--color-ink);
    margin: var(--space-xl) 0 var(--space-sm);
  }
  .prose h2 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--color-ink);
    margin: var(--space-lg) 0 var(--space-xs);
  }
  .prose h3 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--color-ink);
    margin: var(--space-lg) 0 var(--space-xs);
  }
  .prose img {
    max-width: 100%;
    height: auto;
    border-radius: var(--rounded-md);
    margin: var(--space-base) 0;
  }
</style>
</head>
<body>

<!-- Top Navigation -->
<nav class="top-nav">
  <div class="container">
    <a href="/" class="top-nav__brand">
      <img src="/logo-1.png" alt="neplov">
      <span class="top-nav__brand-text">neplov</span>
    </a>
    <ul class="top-nav__links" id="nav-links">
      <li><a href="/#about" class="top-nav__link">neplovとは</a></li>
      <li><a href="/#projects" class="top-nav__link">つくったもの</a></li>
      <li><a href="/blog/" class="top-nav__link top-nav__link--active">ブログ</a></li>
      <li><a href="/#updates" class="top-nav__link">更新履歴</a></li>
    </ul>
    <button class="nav-hamburger" aria-label="メニュー" onclick="document.getElementById('nav-links').classList.toggle('top-nav__links--open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Main Content -->
<main class="section">
  <div class="container">

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
      <a href="/">トップページ</a>
      <span class="breadcrumb__sep">›</span>
      <a href="/blog/">ブログ</a>
      <span class="breadcrumb__sep">›</span>
      <span id="breadcrumb-title">読み込み中...</span>
    </nav>

    <!-- Article Header -->
    <div id="article-header" class="mb-base"></div>
    <hr style="border: none; border-top: 1px solid var(--color-hairline); margin-bottom: var(--space-lg);">

    <!-- Article Body -->
    <div id="article-body" class="prose">
      <p class="body-sm text-muted">記事を読み込んでいます...</p>
    </div>

    <div class="mt-xl" style="border-top: 1px solid var(--color-hairline); padding-top: var(--space-lg);">
      <a href="/blog/" class="body-sm">&lt;&lt; ブログ記事一覧に戻る</a>
      <span class="body-sm text-muted"> / </span>
      <a href="/" class="body-sm">トップページに戻る</a>
    </div>

  </div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="footer__brand"><img src="/logo-1.png" alt="neplov" style="height: 16px;"></div>
    <div class="footer__copy">Copyright &copy; 2026 neplov. All Rights Reserved.</div>
  </div>
</footer>

<script>
var slug = window.location.hash ? window.location.hash.substring(1) : null;

if (!slug) {
  document.getElementById("article-body").innerHTML = '<p class="body-sm" style="color: var(--color-error);">記事が指定されていません。<br><br><a href="/blog/">ブログ記事一覧</a>からお選びください。</p>';
  document.getElementById("breadcrumb-title").textContent = "エラー";
  document.getElementById("article-header").innerHTML = '<h1 class="display-md">エラー</h1>';
} else {
  fetch("posts/" + slug + ".md")
    .then(function(res) {
      if (!res.ok) throw new Error("not found");
      return res.text();
    })
    .then(function(md) {
      // Parse front matter (simple: first lines starting with key: value between --- delimiters)
      var body = md;
      var title = slug;
      var date = "";

      if (md.substring(0, 3) === "---") {
        var end = md.indexOf("---", 3);
        if (end !== -1) {
          var front = md.substring(3, end).trim();
          body = md.substring(end + 3).trim();
          var lines = front.split("\n");
          for (var i = 0; i < lines.length; i++) {
            var colon = lines[i].indexOf(":");
            if (colon !== -1) {
              var key = lines[i].substring(0, colon).trim();
              var val = lines[i].substring(colon + 1).trim();
              if (key === "title") title = val;
              if (key === "date") date = val;
            }
          }
        }
      }

      document.title = title + " - neplov ブログ";
      document.getElementById("breadcrumb-title").textContent = title;
      document.getElementById("article-header").innerHTML =
        '<h1 class="display-md">' + title + '</h1>' +
        (date ? '<p class="caption code-text mt-xs">' + date + '</p>' : '');

      var html = marked.parse(body);
      var el = document.getElementById("article-body");
      el.innerHTML = html;
    })
    .catch(function() {
      document.getElementById("article-body").innerHTML = '<p class="body-sm" style="color: var(--color-error);">記事が見つかりませんでした。<br><br>URLを確認するか、<a href="/blog/">ブログ記事一覧</a>からお選びください。</p>';
      document.getElementById("breadcrumb-title").textContent = "記事が見つかりません";
      document.getElementById("article-header").innerHTML = '<h1 class="display-md">記事が見つかりません</h1>';
    });
}
</script>

</body>
</html>
