<script>
var slug = window.location.hash ? window.location.hash.substring(1) : null;

if (!slug) {
  document.getElementById("article-body").innerHTML = '<font size="2" face="MS Pゴシック, Osaka, sans-serif" color="#CC0000">記事が指定されていません。<br><br><a href="/blog/">ブログ記事一覧</a>からお選びください。</font>';
  document.getElementById("breadcrumb-title").textContent = "エラー";
  document.getElementById("article-header").innerHTML = '<font size="4" color="#000066" face="Arial, Helvetica, sans-serif"><b>エラー</b></font>';
} else {
  fetch("posts/" + slug + ".md")
    .then(function(res) {
      if (!res.ok) throw new Error("not found");
      return res.text();
    })
    .then(function(md) {
      // Parse front matter (simple: first lines starting with key: value between --- delimiters)
      var body = md;
      var title = slug;
      var date = "";

      if (md.substring(0, 3) === "---") {
        var end = md.indexOf("---", 3);
        if (end !== -1) {
          var front = md.substring(3, end).trim();
          body = md.substring(end + 3).trim();
          var lines = front.split("\n");
          for (var i = 0; i < lines.length; i++) {
            var colon = lines[i].indexOf(":");
            if (colon !== -1) {
              var key = lines[i].substring(0, colon).trim();
              var val = lines[i].substring(colon + 1).trim();
              if (key === "title") title = val;
              if (key === "date") date = val;
            }
          }
        }
      }

      document.title = title + " - neplov ブログ";
      document.getElementById("breadcrumb-title").textContent = title;
      document.getElementById("article-header").innerHTML =
        '<font size="4" color="#000066" face="Arial, Helvetica, sans-serif"><b>' + title + '</b></font>' +
        (date ? '<br><font size="2" face="Courier New, monospace" color="#666666">' + date + '</font>' : '');

      var html = marked.parse(body);
      var el = document.getElementById("article-body");
      el.innerHTML = '<font size="2" face="MS Pゴシック, Osaka, sans-serif">' + html + '</font>';
    })
    .catch(function() {
      document.getElementById("article-body").innerHTML = '<font size="2" face="MS Pゴシック, Osaka, sans-serif" color="#CC0000">記事が見つかりませんでした。<br><br>URLを確認するか、<a href="/blog/">ブログ記事一覧</a>からお選びください。</font>';
      document.getElementById("breadcrumb-title").textContent = "記事が見つかりません";
      document.getElementById("article-header").innerHTML = '<font size="4" color="#000066" face="Arial, Helvetica, sans-serif"><b>記事が見つかりません</b></font>';
    });
}
</script>
