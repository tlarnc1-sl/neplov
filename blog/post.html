<script>
var params = new URLSearchParams(window.location.search);
var slug = params.get("p");

// フロントマターをパースして title / date / body を返す
function parseFrontMatter(md, fallbackSlug) {
  var body = md;
  var title = fallbackSlug || "";
  var date  = "";
  if (md.substring(0, 3) === "---") {
    var end = md.indexOf("---", 3);
    if (end !== -1) {
      var front = md.substring(3, end).trim();
      body = md.substring(end + 3).trim();
      var lines = front.split("\n");
      for (var i = 0; i < lines.length; i++) {
        var colon = lines[i].indexOf(":");
        if (colon !== -1) {
          var key = lines[i].substring(0, colon).trim();
          var val = lines[i].substring(colon + 1).trim();
          if (key === "title") title = val;
          if (key === "date")  date  = val;
        }
      }
    }
  }
  return { title: title, date: date, body: body };
}

if (!slug) {
  // ---- 一覧モード ----
  // posts/ ディレクトリリスティング (サーバー側で autoindex が有効であること) を
  // fetch して .md ファイルのスラッグを収集し、各フロントマターから一覧を動的生成する

  document.title = "ブログ記事一覧 - neplov";
  document.getElementById("breadcrumb-title").textContent = "記事一覧";
  document.getElementById("article-header").innerHTML =
    '<font size="4" color="#000066" face="Arial, Helvetica, sans-serif"><b>ブログ記事一覧</b></font>';

  // ---- ブログ説明（閉じられるやつ）----
  var introOpen = localStorage.getItem("neplov_blog_intro") !== "closed";

  var introHTML =
    '<table width="100%" border="1" cellpadding="6" cellspacing="0" bordercolor="#CCCCCC">' +
      '<tr bgcolor="#EEEEFF">' +
        '<td>' +
          '<font size="2" face="MS Pゴシック, Osaka, sans-serif" color="#000066"><b>■ このブログについて</b></font>' +
        '</td>' +
        '<td align="right" nowrap>' +
          '<a href="#" id="intro-toggle" style="color:#000066;font-size:11px;font-family:MS Pゴシック,Osaka,sans-serif;text-decoration:none;">' +
            (introOpen ? '[閉じる]' : '[開く]') +
          '</a>' +
        '</td>' +
      '</tr>' +
      '<tr id="intro-body"' + (introOpen ? '' : ' style=\"display:none;\"') + '>' +
        '<td colspan="2" bgcolor="#FFFFFF">' +
          '<font size="2" face="MS Pゴシック, Osaka, sans-serif">' +
            'ブログです。つくったものや、思ったこと、その他よくわからないことについて書いています。<br><br>' +
            '更新頻度はとくに決めていません。書きたいことが出てきたときに書く、というかんじでやっています。なのでたくさん書く時期もあれば、しばらく何もない時期もあります。そういうものだと思ってください。<br><br>' +
            '内容に統一感はありません。サイト全体もそうなので、まあそういうことです。気楽に読んでいただければうれしいです。' +
          '</font>' +
        '</td>' +
      '</tr>' +
    '</table>' +
    '<br>';

  document.getElementById("article-body").innerHTML =
    introHTML +
    '<div id="blog-list"><font size="2" face="MS Pゴシック, Osaka, sans-serif" color="#999999">読み込み中...</font></div>';

  // トグルの動作
  document.getElementById("intro-toggle").addEventListener("click", function(e) {
    e.preventDefault();
    var body = document.getElementById("intro-body");
    var btn  = document.getElementById("intro-toggle");
    if (body.style.display === "none") {
      body.style.display = "";
      btn.textContent = "[閉じる]";
      localStorage.setItem("neplov_blog_intro", "open");
    } else {
      body.style.display = "none";
      btn.textContent = "[開く]";
      localStorage.setItem("neplov_blog_intro", "closed");
    }
  });

  fetch("posts/")
    .then(function(res) {
      if (!res.ok) throw new Error("directory listing unavailable");
      return res.text();
    })
    .then(function(html) {
      // サーバーが返すディレクトリ一覧 HTML から .md へのリンクを抽出
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, "text/html");
      var anchors = Array.from(doc.querySelectorAll("a[href]"));
      var slugs = anchors
        .map(function(a) { return a.getAttribute("href"); })
        .filter(function(href) {
          // 絶対URLや親ディレクトリリンク・クエリ付きリンクを除外し .md のみ残す
          return /\.md$/i.test(href) &&
                 !/^(https?:)?\/\//i.test(href) &&
                 href.indexOf("?") === -1;
        })
        .map(function(href) {
          // "subdir/foo.md" → "foo" のようにファイル名部分だけ取る
          return href.replace(/^.*\//, "").replace(/\.md$/i, "");
        })
        .filter(Boolean);

      if (slugs.length === 0) throw new Error("no posts found");

      // 各記事のフロントマターを並列取得
      return Promise.all(slugs.map(function(s) {
        return fetch("posts/" + s + ".md")
          .then(function(r) {
            if (!r.ok) throw new Error("fetch failed");
            return r.text();
          })
          .then(function(md) {
            var fm = parseFrontMatter(md, s);
            return { slug: s, title: fm.title, date: fm.date };
          })
          .catch(function() { return null; }); // 取得失敗した記事は無視
      }));
    })
    .then(function(posts) {
      // null を除去して日付降順ソート
      posts = posts.filter(Boolean);
      posts.sort(function(a, b) {
        return (b.date || "").localeCompare(a.date || "");
      });

      if (posts.length === 0) throw new Error("no valid posts");

      // テーブル形式で一覧を組み立て（既存の見た目に合わせた retro スタイル）
      var rows = posts.map(function(p, idx) {
        var sep = idx > 0
          ? '<tr><td colspan="3"><hr size="1" color="#EEEEEE" noshade></td></tr>'
          : "";
        return sep +
          '<tr valign="top">' +
            '<td nowrap>' +
              '<font size="2" face="Courier New, monospace" color="#666666">' +
                (p.date || "&nbsp;") +
              '</font>' +
            '</td>' +
            '<td width="12">&nbsp;</td>' +
            '<td width="100%">' +
              '<font size="2" face="MS Pゴシック, Osaka, sans-serif">' +
                '<a href="?p=' + encodeURIComponent(p.slug) + '">' + p.title + '</a>' +
              '</font>' +
            '</td>' +
          '</tr>';
      }).join("");

      document.getElementById("blog-list").innerHTML =
        '<table width="100%" border="0" cellpadding="4" cellspacing="0">' +
          rows +
        '</table>';
    })
    .catch(function(err) {
      document.getElementById("blog-list").innerHTML =
        '<table width="100%" border="0" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:28px 0;">' +
          '<font face="Courier New, monospace" size="3" color="#666666"><pre style="display:inline-block;text-align:left;background:none;padding:0;margin:0;color:#555555;font-size:13px;line-height:1.6;">' +
            '   ∧＿∧\n' +
            '  （ ´・ω・）  あれ...\n' +
            '  //     \\\n' +
            ' (( ＿＿＿ )) ' +
          '</pre></font>' +
          '<br><br>' +
          '<font size="2" face="MS Pゴシック, Osaka, sans-serif" color="#333333">' +
            '記事一覧がうまく取得できませんでした。<br>' +
            'しばらく時間をおいてからまたアクセスしてみてください。' +
          '</font>' +
          '<br><br>' +
          '<font size="2" face="MS Pゴシック, Osaka, sans-serif"><a href="/">トップページに戻る</a></font>' +
        '</td></tr></table>';
      document.getElementById("breadcrumb-title").textContent = "記事一覧";
    });

} else {
  // ---- 記事表示モード（既存の動作をそのまま維持）----
  fetch("posts/" + slug + ".md")
    .then(function(res) {
      if (!res.ok) throw new Error("not found");
      return res.text();
    })
    .then(function(md) {
      var fm = parseFrontMatter(md, slug);

      document.title = fm.title + " - neplov ブログ";
      document.getElementById("breadcrumb-title").textContent = fm.title;
      document.getElementById("article-header").innerHTML =
        '<font size="4" color="#000066" face="Arial, Helvetica, sans-serif"><b>' + fm.title + '</b></font>' +
        (fm.date
          ? '<br><font size="2" face="Courier New, monospace" color="#666666">' + fm.date + '</font>'
          : "");

      var html = marked.parse(fm.body);
      var el = document.getElementById("article-body");
      el.innerHTML = '<font size="2" face="MS Pゴシック, Osaka, sans-serif">' + html + '</font>';
    })
    .catch(function() {
      document.getElementById("article-body").innerHTML =
        '<font size="2" face="MS Pゴシック, Osaka, sans-serif" color="#CC0000">' +
          '記事が見つかりませんでした。<br><br>' +
          'URLを確認するか、<a href="/blog/">ブログ記事一覧</a>からお選びください。' +
        '</font>';
      document.getElementById("breadcrumb-title").textContent = "記事が見つかりません";
      document.getElementById("article-header").innerHTML =
        '<font size="4" color="#000066" face="Arial, Helvetica, sans-serif"><b>記事が見つかりません</b></font>';
    });
}
</script>
