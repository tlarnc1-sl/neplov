<script>
var posts = [
  { slug: "hello", title: "はじめてのブログ", date: "2026/06/14" }
];

function renderList() {
  var el = document.getElementById("post-list");
  if (posts.length === 0) {
    el.innerHTML = '<font size="2" face="MS Pゴシック, Osaka, sans-serif" color="#999999">まだ記事がありません。</font>';
    return;
  }
  var html = '<table width="100%" border="1" cellpadding="6" cellspacing="0" bordercolor="#999999">';
  html += '<tr bgcolor="#EEEEFF"><td width="110"><font size="2" face="Arial, sans-serif"><b>日付</b></font></td><td><font size="2" face="Arial, sans-serif"><b>タイトル</b></font></td></tr>';
  for (var i = 0; i < posts.length; i++) {
    var bg = i % 2 === 0 ? "#FFFFFF" : "#F8F8FF";
    html += '<tr bgcolor="' + bg + '">';
    html += '<td><font size="2" face="Courier New, monospace" color="#000066">' + posts[i].date + '</font></td>';
    html += '<td><font size="2" face="MS Pゴシック, Osaka, sans-serif"><a href="post.html?p=' + posts[i].slug + '">' + posts[i].title + '</a></font></td>';
    html += '</tr>';
  }
  html += '</table>';
  el.innerHTML = html;
}

renderList();
</script>
